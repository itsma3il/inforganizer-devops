version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: inforganizer_postgres
    environment:
      POSTGRES_USER:     inforganizer
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB:       inforganizer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inforganizer"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inforganizer:local
    container_name: inforganizer
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://inforganizer:devpassword@postgres:5432/inforganizer
      - JWT_SECRET=dev-jwt-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
