apiVersion: apps/v1
kind: Deployment
metadata:
  name: inforganizer
  labels:
    app: inforganizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inforganizer
  template:
    metadata:
      labels:
        app: inforganizer
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ['sh', '-c', 'until pg_isready -h postgres -p 5432; do echo "waiting for postgres..."; sleep 3; done']
      containers:
        - name: inforganizer
          image: ghcr.io/itsma3il/inforganizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: JWT_SECRET
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
