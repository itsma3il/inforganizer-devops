###############################################################################
# GitHub Actions CI + GitOps image update for Inforganizer
#
# Triggers: push to main, pull_request to main
#
# Jobs:
#   1. test           — install deps and run tests
#   2. build-push-ecr — build image and push to AWS ECR (main only)
#   3. gitops-update  — commit new image tag into k8s/deployment.yaml (main only)
#
# Required secrets (Settings -> Secrets and variables -> Actions):
#   AWS_GITHUB_ROLE_ARN - IAM role ARN assumed via GitHub OIDC
#   AWS_ACCOUNT_ID      - AWS account ID (example: 883999922093)
#
# Required repository settings:
#   - Actions > Workflow permissions > Read and write permissions
###############################################################################
name: CI/CD (GitOps + ECR)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: inforganizer

jobs:
  test:
    name: Install and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inforganizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inforganizer_test
      JWT_SECRET: test-secret-for-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-push-ecr:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_uri: ${{ steps.vars.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI and tag
        id: vars
        run: |
          ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          if [ -z "$ACCOUNT_ID" ]; then
            echo "ERROR: AWS_ACCOUNT_ID secret is not set in GitHub Actions"
            echo "Set it in: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

          IMAGE_TAG="sha-${GITHUB_SHA::12}"
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

          echo "Built image reference: ${IMAGE_URI}:${IMAGE_TAG}"

      - name: Build and push
        run: |
          docker build \
            -t "${{ steps.vars.outputs.image_uri }}:${{ steps.vars.outputs.image_tag }}" \
            -t "${{ steps.vars.outputs.image_uri }}:latest" \
            .
          docker push "${{ steps.vars.outputs.image_uri }}:${{ steps.vars.outputs.image_tag }}"
          docker push "${{ steps.vars.outputs.image_uri }}:latest"

  gitops-update:
    name: Update GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-push-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update deployment image tag
        env:
          IMAGE_URI: ${{ needs.build-push-ecr.outputs.image_uri }}
          IMAGE_TAG: ${{ needs.build-push-ecr.outputs.image_tag }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          set -e

          # Validate that IMAGE_URI is not empty and looks correct
          if [ -z "$IMAGE_URI" ] || [ "$IMAGE_URI" = ".dkr.ecr.eu-west-3.amazonaws.com/inforganizer" ]; then
            echo "ERROR: IMAGE_URI is malformed or AWS_ACCOUNT_ID secret not set"
            echo "IMAGE_URI=$IMAGE_URI"
            exit 1
          fi

          if [ -z "$IMAGE_TAG" ]; then
            echo "ERROR: IMAGE_TAG is empty"
            exit 1
          fi

          FULL_IMAGE="${IMAGE_URI}:${IMAGE_TAG}"
          echo "Updating deployment.yaml with image: ${FULL_IMAGE}"

          # Use a safer sed that only replaces specific image lines, not corrupting the file
          sed -i.bak \
            -e "s|image: .*dkr.ecr.*$|image: ${FULL_IMAGE}|" \
            -e "s|image: :sha-.*$|image: ${FULL_IMAGE}|" \
            k8s/deployment.yaml

          echo "Updated deployment.yaml:"
          grep -n "image:" k8s/deployment.yaml

          # Verify the image was updated correctly
          if ! grep -q "${FULL_IMAGE}" k8s/deployment.yaml; then
            echo "ERROR: Image tag was not updated correctly"
            exit 1
          fi

      - name: Commit and push manifest update
        env:
          IMAGE_TAG: ${{ needs.build-push-ecr.outputs.image_tag }}
        run: |
          set -e
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore(gitops): update image tag to ${IMAGE_TAG} [skip ci]"
          git push
