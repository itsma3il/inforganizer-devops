###############################################################################
# GitHub Actions CI/CD pipeline for Inforganizer
#
# Triggers: push to main, pull_request to main
#
# Jobs:
#   1. test        — install deps & run API tests
#   2. build-push  — build Docker image and push to AWS ECR  (main only)
#   3. deploy      — invoke SSM Run Command on EC2 master for rollout  (main only)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   AWS_GITHUB_ROLE_ARN  — IAM role ARN assumed via GitHub OIDC
#   AWS_ACCOUNT_ID       — AWS account ID (e.g., 883999922093)
#   AWS_MASTER_INSTANCE_ID — EC2 instance ID for k3s master (e.g., i-0123456789abcdef0)
#
# GITHUB_TOKEN is provided automatically — no action needed.
###############################################################################
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  ECR_REPOSITORY: inforganizer

jobs:
  test:
    name: Install and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inforganizer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inforganizer_test
      JWT_SECRET: test-secret-for-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  build-push-ecr:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_uri: ${{ steps.vars.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI and tag
        id: vars
        run: |
          echo "image_tag=latest" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build -t "${{ steps.vars.outputs.image_uri }}:${{ steps.vars.outputs.image_tag }}" -t "${{ steps.vars.outputs.image_uri }}:latest" .
          docker push "${{ steps.vars.outputs.image_uri }}:${{ steps.vars.outputs.image_tag }}"
          docker push "${{ steps.vars.outputs.image_uri }}:latest"

  deploy-k3s:
    name: Deploy to k3s on AWS
    runs-on: ubuntu-latest
    needs: build-push-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch ECR password
        id: ecr
        run: |
          ECR_PASSWORD="$(aws ecr get-login-password --region "${{ env.AWS_REGION }}")"
          echo "password=${ECR_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM Run Command
        id: ssm
        env:
          ECR_PASSWORD: ${{ steps.ecr.outputs.password }}
          IMAGE_URI: ${{ needs.build-push-ecr.outputs.image_uri }}
          IMAGE_TAG: ${{ needs.build-push-ecr.outputs.image_tag }}
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${{ secrets.AWS_MASTER_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy inforganizer image ${IMAGE_TAG}" \
            --parameters commands="[
              \"set -e\",
              \"sudo k3s kubectl create secret docker-registry ecr-creds --docker-server='${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com' --docker-username='AWS' --docker-password='${ECR_PASSWORD}' --dry-run=client -o yaml | sudo k3s kubectl apply -f -\",
              \"sudo k3s kubectl set image deployment/inforganizer inforganizer='${IMAGE_URI}:${IMAGE_TAG}'\",
              \"sudo k3s kubectl rollout status deployment/inforganizer --timeout=300s\",
              \"sudo k3s kubectl get pods -l app=inforganizer -o wide\"
            ]" \
            --query "Command.CommandId" \
            --output text)"

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command result
        run: |
          COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
          INSTANCE_ID="${{ secrets.AWS_MASTER_INSTANCE_ID }}"

          for _ in $(seq 1 90); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || true)"

            case "${STATUS}" in
              Success)
                echo "SSM deployment succeeded"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "StandardOutputContent" \
                  --output text
                exit 0
                ;;
              Failed|ExecutionTimedOut|TimedOut|Cancelled|Cancelling)
                echo "SSM deployment failed with status: ${STATUS}"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "StandardOutputContent" \
                  --output text || true
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query "StandardErrorContent" \
                  --output text || true
                exit 1
                ;;
              Pending|InProgress|Delayed|"")
                sleep 5
                ;;
              *)
                echo "Unexpected SSM status: ${STATUS}"
                sleep 5
                ;;
            esac
          done

          echo "SSM deployment timed out waiting for completion"
          exit 1
